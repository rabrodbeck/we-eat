<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" fill="none">
  <!-- Gradients -->
  <defs>
    <!-- Emerald gradient for the bowl -->
    <linearGradient id="bowl-grad" x1="96" y1="280" x2="416" y2="440" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#10b981" />
      <stop offset="100%" stop-color="#059669" />
    </linearGradient>
    
    <!-- Mint-to-emerald gradient for the AI/steam waves -->
    <linearGradient id="wave-grad" x1="256" y1="50" x2="256" y2="220" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#a7f3d0" /> <!-- Mint -->
      <stop offset="50%" stop-color="#34d399" />
      <stop offset="100%" stop-color="#10b981" />
    </linearGradient>

    <!-- Amber gradient for chopsticks -->
    <linearGradient id="chopstick-grad" x1="180" y1="140" x2="420" y2="280" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#f59e0b" />
      <stop offset="100%" stop-color="#d97706" />
    </linearGradient>
  </defs>

  <!-- AI Soundwaves / Steam Vapors -->
  <g opacity="0.9">
    <!-- Wave 1 (Left) -->
    <path d="M 160 220 C 180 180, 140 140, 160 100" stroke="url(#wave-grad)" stroke-width="16" stroke-linecap="round" fill="none" />
    
    <!-- Wave 2 (Center-Left) -->
    <path d="M 224 220 C 249 170, 199 120, 224 70" stroke="url(#wave-grad)" stroke-width="20" stroke-linecap="round" fill="none" />
    
    <!-- Wave 3 (Center-Right) -->
    <path d="M 288 220 C 313 170, 263 120, 288 70" stroke="url(#wave-grad)" stroke-width="20" stroke-linecap="round" fill="none" />
    
    <!-- Wave 4 (Right) -->
    <path d="M 352 220 C 372 180, 332 140, 352 100" stroke="url(#wave-grad)" stroke-width="16" stroke-linecap="round" fill="none" />
  </g>

  <!-- Chopsticks (Crossing behind the bowl rim but in front of steam) -->
  <g opacity="0.95">
    <rect x="230" y="160" width="220" height="12" rx="6" transform="rotate(-28, 230, 160)" fill="url(#chopstick-grad)" />
    <rect x="250" y="135" width="220" height="12" rx="6" transform="rotate(-33, 250, 135)" fill="url(#chopstick-grad)" />
  </g>

  <!-- The Bowl -->
  <g>
    <!-- Bowl Body -->
    <path d="M 96 280 C 96 380, 160 440, 256 440 C 352 440, 416 380, 416 280 Z" fill="url(#bowl-grad)" />
    
    <!-- Bowl Rim (gives it a high-end 3D depth) -->
    <rect x="80" y="260" width="352" height="20" rx="10" fill="url(#bowl-grad)" />
    <rect x="80" y="260" width="352" height="20" rx="10" stroke="#047857" stroke-width="2" fill="none" opacity="0.4" />
  </g>
</svg>